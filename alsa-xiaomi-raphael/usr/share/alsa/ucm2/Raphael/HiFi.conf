# UCM2 configuration for Xiaomi Raphael (SM8150)
# - Speaker: TFA9874 on Quaternary MI2S (pcm1 = MultiMedia2)
# - Headphone: WCD9340 on SLIMBUS_0_RX (pcm0 = MultiMedia1)
# - Headset jack detection via WCD9340 MBHC
#
# IMPORTANT: Q6 routing mixers (SLIMBUS_0_RX/QUAT_MI2S_RX Audio Mixer) must
# ONLY be set in SectionVerb EnableSequence and NEVER cleared in device-level
# DisableSequence. Clearing them breaks q6routing_stream_open() with
# "Routing not setup for MultiMedia-N Session" because session->port_id is
# reset to -1, causing q6asm_dai_prepare() to fail and freeing audio_client.

SectionVerb {
	EnableSequence [
		# Enable Q6 routing for both PCM devices (required for PulseAudio probe)
		# These must stay enabled for the lifetime of the card.
		cset "name='SLIMBUS_0_RX Audio Mixer MultiMedia1' 1"
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 1"
	]

	DisableSequence [
	]
}

# ---------- Speaker (TFA9874 via Quaternary MI2S) ----------
# TFA9874 has no codec-level mixer controls exposed via ALSA.
# Audio routing to the speaker is handled entirely by DAPM in the Q6 DSP.
# Do NOT put Q6 routing mixer here - it must stay enabled always.

SectionDevice."Speaker" {
	Comment "Speaker (TFA9874)"

	EnableSequence [
	]

	DisableSequence [
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:0,1"
	}
}

# ---------- Headphone (WCD9340 HPHL/HPHR via SLIMBUS) ----------
# Only control WCD9340 codec-specific routing here.
# Do NOT touch SLIMBUS_0_RX Audio Mixer MultiMedia1 - it must stay enabled.

SectionDevice."Headphone" {
	Comment "Headphone (WCD9340)"

	EnableSequence [
		# WCD9340 SLIM RX routing (must be re-set on every plug because
		# DAPM clears SLIM RX1 MUX / RX INT MUX when HPH path powers down)
		cset "name='SLIM RX0 MUX' AIF1_PB"
		cset "name='SLIM RX1 MUX' AIF1_PB"
		cset "name='RX INT1_1 MIX1 INP0' RX0"
		cset "name='RX INT2_1 MIX1 INP0' RX1"
		# Enable WCD9340 headphone path
		cset "name='COMP1 Switch' 1"
		cset "name='COMP2 Switch' 1"
		cset "name='RX INT1 DEM MUX' CLSH_DSM_OUT"
		cset "name='RX INT2 DEM MUX' CLSH_DSM_OUT"
		cset "name='RX1 Digital Volume' 68"
		cset "name='RX2 Digital Volume' 68"
	]

	DisableSequence [
		cset "name='COMP1 Switch' 0"
		cset "name='COMP2 Switch' 0"
		cset "name='RX1 Digital Volume' 0"
		cset "name='RX2 Digital Volume' 0"
		cset "name='RX INT1 DEM MUX' ZERO"
		cset "name='RX INT2 DEM MUX' ZERO"
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:0,0"
		JackControl "Headset Jack"
		JackHWMute "Speaker"
	}
}
